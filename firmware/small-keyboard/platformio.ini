; Small Keyboard firmware — CDC serial + VID/PID 0x1189/0x8890
; Build: pio run   Upload: pio run --target upload (Pico in BOOTSEL mode)

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

; CDC serial: default (Serial is USB CDC). No extra flag needed.
; USB identity so the config app recognizes this device as "Small Keyboard":
board_build.arduino.earlephilhower.usb_vid = 0x1189
board_build.arduino.earlephilhower.usb_pid = 0x8890
board_build.arduino.earlephilhower.usb_manufacturer = "Small Keyboard"
board_build.arduino.earlephilhower.usb_product = "Small Keyboard"
